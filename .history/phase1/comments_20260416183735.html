<!DOCTYPE html>
<html lang="EN">
    <head>
        <title>my js project</title>
        <meta charset="utf-8"/>
    </head>
    <body>
        <!-- This is an HTML single-line comment -->
        <p>jabulani mayenda</p>
        
        <!-- This is another HTML comment -->
        
        <!--
            This is an HTML multi-line comment
            it can span multiple lines
            everything here is ignored by the browser
        -->
        
        <script type="text/javascript">
            // This is a JavaScript single-line comment
            document.write("hello world");
            
            /*
                This is a JavaScript multi-line comment
                it can span multiple lines
                useful for longer explanations
            */
        </script>
    </body>
</html>
